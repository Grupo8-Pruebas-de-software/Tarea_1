{% extends 'base.html' %}
{% block content %}
<h2>Reporte General</h2>
<div class="row mt-3">
    <div class="col-md-4">
        <div class="card text-white bg-primary mb-3">
            <div class="card-body">
                <h5 class="card-title">Total de Eventos</h5>
                <p class="card-text fs-3">{{ resumen.total_eventos }}</p>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card text-white bg-success mb-3">
            <div class="card-body">
                <h5 class="card-title">Total de Cupos Disponibles</h5>
                <p class="card-text fs-3">{{ resumen.total_cupos }}</p>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card text-white bg-danger mb-3">
            <div class="card-body">
                <h5 class="card-title">Eventos Agotados</h5>
                <p class="card-text fs-3">{{ resumen.eventos_agotados }}</p>
            </div>
        </div>
    </div>
</div>
<a href="{{ url_for('eventos_index') }}" class="btn btn-secondary mt-3">Volver a Eventos</a>
{% endblock %}
